name: Build and Deploy App

on:
  # Manual trigger mirrors the Azure DevOps trigger:none behavior.
  workflow_dispatch:
    inputs:
      environmentCode:
        description: Environment Code
        required: true
        type: choice
        options:
          - POC
          - DEV
          - PRD
        default: POC

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build Frontend and Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Build React Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build Functions Backend
        working-directory: backend
        run: |
          npm ci
          npm run build

  deploy:
    name: Deploy Frontend and Backend
    runs-on: ubuntu-latest
    needs: build

    # Binding the job to a GitHub Environment lets you scope secrets/approvals.
    environment: ${{ github.event.inputs.environmentCode }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Environment Variables
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          ENV_CODE="${{ github.event.inputs.environmentCode }}"

          ENV_CODE_LOWER="${ENV_CODE,,}"
          ENV_FILE="variables/${ENV_CODE_LOWER}.yml"

          if [ ! -f "${ENV_FILE}" ]; then
            echo "Variables file is missing for environment ${ENV_CODE}." >&2
            exit 1
          fi

          RESOURCE_GROUP_NAME="$(awk -F": " '/^[[:space:]]*resourceGroupName:/ {value=$2; gsub(/\"|\047/, "", value); print value; exit}' "${ENV_FILE}")"

          echo "resource_group_name=${RESOURCE_GROUP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          # Create these as GitHub Environment secrets (POC/DEV/PRD) or repository secrets.
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Placeholder Deploy Step
        run: |
          echo "TODO: Add deployment commands for SWA and Function App."
          echo "Environment: ${{ github.event.inputs.environmentCode }}"
          echo "Resource Group: ${{ steps.resolve.outputs.resource_group_name }}"

      # Example future deployment steps:
      # - Azure Functions: zip deploy via az functionapp deployment source config-zip
      # - Static Web App: deploy frontend artifact via Azure Static Web Apps deploy action
